schema_version: "idea_forge.v1"
kind: "opportunity_pack_spec"
license: "Apache-2.0"

default_domain: "agents"

defaults:
  agents:
    params:
      replay:
        deterministic_required: true
      loop:
        window_steps: 20
        max_repeated_signatures: 6
      stability:
        regression_required: true
      cost:
        max_cost_per_solved_delta_pct: 20

court:
  version: "v1"
  states:
    - id: "PASS"
      meaning: "All hard witnesses + origin controls satisfied."
    - id: "ESCAPE"
      meaning: "Massive performance spike but one witness fails; higher burden of proof required."
    - id: "FAIL"
      meaning: "Hard witness fails without compelling spike OR origin controls fail."

issue_intake:
  required_title_prefix: "Opportunity Pack:"
  required_fields:
    - "id"
    - "domain"
    - "claim"
    - "cheat_path"
    - "court_tests"
    - "falsifier"
    - "escape_hatch"
    - "min_validation"
    - "buyer"
    - "why_they_care"
    - "notes"

opportunity_pack:
  id_format: "^OP-[A-Za-z0-9_-]{3,}$"
  domains:
    - "materials"
    - "catalysts"
    - "synbio"
    - "agents"

  fields:
    id:
      type: "string"
      required: true
      description: "Unique Opportunity Pack identifier."
      example: "OP-AGENTS-001"

    domain:
      type: "enum"
      required: true
      enum: ["materials","catalysts","synbio","agents"]
      default: "agents"

    claim:
      type: "string"
      required: true
      description: "One-sentence, measurable claim."
      constraints:
        max_chars: 240

    cheat_path:
      type: "string"
      required: true
      description: "Cheapest way to 'win' the metric without solving the real task."

    performance_signal:
      type: "object"
      required: false
      description: "Optional headline metric (kept separate from witnesses)."
      properties:
        metric:
          type: "string"
        value:
          type: "number"
        units:
          type: "string"
        spike_class:
          type: "enum"
          enum: ["none","moderate","major"]

    court_tests:
      type: "array"
      required: true
      min_items: 3
      description: "Independent witnesses (orthogonal failure modes)."
      items:
        type: "object"
        required_fields: ["id","name","role","hardness","pass_condition","fail_condition"]
        properties:
          id:
            type: "string"
            example: "W1_REPLAY"
          name:
            type: "string"
            example: "Replay audit"
          role:
            type: "enum"
            enum: ["origin","cheat_suppression","stability","cost_feasibility","safety","replay"]
          hardness:
            type: "enum"
            enum: ["hard","soft"]
          pass_condition:
            type: "string"
          fail_condition:
            type: "string"

    falsifier:
      type: "string"
      required: true
      description: "Cheapest observation that kills the claim."

    escape_hatch:
      type: "object"
      required: true
      description: "Higher burden of proof if spike is major but a witness fails."
      properties:
        trigger:
          type: "string"
          example: "performance_signal.spike_class == major AND exactly_one_witness_failed == true"
        required_escalations:
          type: "array"
          items:
            type: "string"
          example:
            - "independent rerun with new seed / fresh environment"
            - "longer evaluation window"
            - "stricter tools/permissions constraints"

    min_validation:
      type: "array"
      required: true
      min_items: 3
      description: "Cheap → mid → expensive validation steps."
      items:
        type: "object"
        required_fields: ["tier","step","expected_readout","stop_rule"]
        properties:
          tier:
            type: "enum"
            enum: ["cheap","mid","expensive"]
          step:
            type: "string"
          expected_readout:
            type: "string"
          stop_rule:
            type: "string"

    buyer:
      type: "string"
      required: true
      description: "Who pays if true (one sentence)."

    why_they_care:
      type: "string"
      required: true
      description: "Specific KPI that moves budget."

    notes:
      type: "string"
      required: true
      description: "Risks, ambiguities, missing data."

starter_courts:
  agents_loop_court:
    defaults_ref: "defaults.agents.params"
    witnesses:
      - id: "W1_REPLAY"
        name: "Replay audit"
        role: "replay"
        hardness: "hard"
        pass_condition: "Deterministic replay reproduces outcome (same inputs, same tool availability)."
        fail_condition: "Outcome not reproducible under deterministic replay."

      - id: "W2_LOOP"
        name: "Loop/idle burn suppression"
        role: "cheat_suppression"
        hardness: "hard"
        pass_condition: "Repeated action signatures <= {max_repeated_signatures} within last {window_steps} steps."
        fail_condition: "Repeated action signatures > {max_repeated_signatures} within last {window_steps} steps."

      - id: "W3_STABILITY"
        name: "Regression stability"
        role: "stability"
        hardness: "hard"
        pass_condition: "Required regression/tests pass on completion."
        fail_condition: "Regression/tests fail or flaky failures exceed policy."

      - id: "W4_COST"
        name: "Cost-per-solved discipline"
        role: "cost_feasibility"
        hardness: "soft"
        pass_condition: "Cost-per-solved delta <= {max_cost_per_solved_delta_pct}% vs baseline on held-out tasks."
        fail_condition: "Cost-per-solved delta > {max_cost_per_solved_delta_pct}% vs baseline."

  batteries_interphase_court:
    witnesses:
      - id: "W1_ORIGIN"
        name: "Independent replicate"
        role: "origin"
        hardness: "hard"
        pass_condition: "Effect replicates in separate build/batch."
        fail_condition: "Effect vanishes on independent replicate."
      - id: "W2_CHEAT"
        name: "Parasitic suppression"
        role: "cheat_suppression"
        hardness: "hard"
        pass_condition: "Parasitic proxy bounded (gas/impedance rise below threshold)."
        fail_condition: "Parasitics dominate (gas spike / impedance runaway)."
      - id: "W3_STABILITY"
        name: "Cycle stability"
        role: "stability"
        hardness: "hard"
        pass_condition: "CE + EIS drift within bounds over N cycles."
        fail_condition: "CE collapses or EIS drift exceeds bound."
      - id: "W4_COST"
        name: "Cost/feasibility"
        role: "cost_feasibility"
        hardness: "soft"
        pass_condition: "Additive available + safety constraints satisfied."
        fail_condition: "Prohibitive cost or safety violation."

  co2_electrolysis_her_court:
    witnesses:
      - id: "W1_ORIGIN"
        name: "Carbon balance"
        role: "origin"
        hardness: "hard"
        pass_condition: "Strict carbon balance closes."
        fail_condition: "Carbon balance does not close."
      - id: "W2_CHEAT"
        name: "HER suppression"
        role: "cheat_suppression"
        hardness: "hard"
        pass_condition: "HER bounded at target current density."
        fail_condition: "HER dominates current."
      - id: "W3_STABILITY"
        name: "Time-on-stream stability"
        role: "stability"
        hardness: "hard"
        pass_condition: "Time-on-stream stable for T hours."
        fail_condition: "Performance decays rapidly."
      - id: "W4_COST"
        name: "Durability/cost"
        role: "cost_feasibility"
        hardness: "soft"
        pass_condition: "Durability + replacement costs acceptable."
        fail_condition: "Fast degradation / high replacement cost."

  synbio_assay_artifact_court:
    witnesses:
      - id: "W1_ORIGIN"
        name: "Controls clean"
        role: "origin"
        hardness: "hard"
        pass_condition: "Negative + contamination controls clean."
        fail_condition: "Signal present in blanks/controls."
      - id: "W2_CHEAT"
        name: "Orthogonal assay"
        role: "cheat_suppression"
        hardness: "hard"
        pass_condition: "Orthogonal assay confirms activity."
        fail_condition: "Second assay contradicts."
      - id: "W3_STABILITY"
        name: "Process-condition stability"
        role: "stability"
        hardness: "hard"
        pass_condition: "Half-life under process conditions meets bound."
        fail_condition: "Rapid deactivation."
      - id: "W4_COST"
        name: "Yield feasibility"
        role: "cost_feasibility"
        hardness: "soft"
        pass_condition: "Expression/yield feasible."
        fail_condition: "Unscalable yield."
