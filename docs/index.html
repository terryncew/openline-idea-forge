<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OpenLine Exchange · Demo</title>

  <meta property="og:title" content="OpenLine Exchange · Demo"/>
  <meta property="og:description" content="Find your pack. Register a falsifier. Run the witnesses. Emit a receipt."/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#060809; --bg1:#0b0e11; --bg2:#111519; --bg3:#171c21;
      --border:rgba(0,255,136,.08); --border2:rgba(0,255,136,.2);
      --text:#c8d8c0; --dim:#3a4a3a; --mid:#6a8a6a;
      --green:#00ff88; --amber:#f5a623; --red:#ff4d6a; --blue:#38d9f0;
      --mono:'JetBrains Mono', ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --display:'Barlow Condensed', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      --body:'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    html{scroll-behavior:smooth}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--body);overflow-x:hidden}
    a{color:inherit}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,255,136,.15);border-radius:99px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .wrap{min-height:100vh}
    .nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 22px;border-bottom:1px solid var(--border);
      background:rgba(6,8,9,.95);backdrop-filter:blur(16px);
      position:sticky;top:0;z-index:50;
    }
    .brand{display:flex;align-items:center;gap:8px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
    .brand span{font-family:var(--display);font-size:18px;font-weight:900;letter-spacing:.06em}
    .crumb{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}

    .ticker{
      overflow:hidden;border-bottom:1px solid var(--border);
      background:rgba(0,255,136,.03);padding:5px 0;
    }
    .tickerTrack{display:inline-flex;white-space:nowrap;animation:ticker 25s linear infinite}
    .tick{display:inline-flex;align-items:center;gap:8px;margin-right:40px;font-family:var(--mono);font-size:9px;color:var(--mid)}
    .tick strong{color:var(--text);font-weight:600}
    .pill{
      padding:2px 8px;border-radius:4px;font-size:8px;font-weight:700;
      letter-spacing:.07em;border:1px solid rgba(255,255,255,.05);
      background:rgba(255,255,255,.03);color:var(--dim);
    }

    .container{max-width:860px;margin:0 auto;padding:0 20px 60px}
    .fu{animation:fadeUp .45s ease both}
    .fu1{animation:fadeUp .45s ease .1s both}
    .fu2{animation:fadeUp .45s ease .2s both}
    .fu3{animation:fadeUp .45s ease .3s both}
    .fu4{animation:fadeUp .45s ease .4s both}

    .progress{display:flex;gap:4px;margin:24px 0 0}
    .bar{height:3px;border-radius:99px;background:var(--bg3);transition:all .4s ease}

    .card{background:var(--bg1);border:1px solid var(--border);border-radius:12px}

    .btn{border:none;cursor:pointer;border-radius:10px;font-family:var(--display);font-weight:900;letter-spacing:.04em;transition:all .15s}
    .btnPrimary{background:var(--green);color:#060809;box-shadow:0 0 32px rgba(0,255,136,.3)}
    .btnPrimary:hover{transform:translateY(-1px)}
    .btnAlt{border:1px solid var(--amber);background:rgba(245,166,35,.08);color:var(--amber)}
    .btnGhost{border:1px solid var(--border);background:transparent;color:var(--mid)}
    .btnGhost:hover{border-color:rgba(0,255,136,.22);color:var(--text)}
    .btn[disabled]{opacity:.35;cursor:default}

    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media(max-width:760px){.grid3{grid-template-columns:1fr}}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(max-width:760px){.grid2{grid-template-columns:1fr}}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    @media(max-width:760px){.grid4{grid-template-columns:repeat(2,1fr)}}

    .chip{
      padding:12px 10px;border-radius:10px;cursor:pointer;text-align:center;
      border:1px solid var(--border);background:var(--bg1);transition:all .15s;user-select:none;
    }
    .chip:hover{transform:translateY(-1px);border-color:rgba(0,255,136,.22)}
    .chip.sel{border-color:var(--green);background:rgba(0,255,136,.07)}
    .chip .label{font-size:11px;font-weight:600;color:var(--text)}
    .chip.sel .label{color:var(--green)}
    .chip .sub{font-family:var(--mono);font-size:8px;color:var(--dim);margin-top:2px}

    .rowCard{
      padding:14px 16px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--bg1);
      display:flex;align-items:center;gap:12px;transition:all .15s;user-select:none;
    }
    .rowCard:hover{transform:translateY(-1px);border-color:rgba(0,255,136,.22)}
    .rowCard.sel{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.07)}
    .rowCard .sub{font-family:var(--mono);font-size:9px;color:var(--dim)}

    .muted{font-family:var(--mono);font-size:11px;color:var(--mid)}
    .kicker{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:.14em}
    .title{font-family:var(--display);font-weight:900;letter-spacing:-.01em}

    .spin{width:64px;height:64px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 28px}
    .miniSteps{display:flex;flex-direction:column;gap:6px;text-align:left}
    .miniStep{display:flex;align-items:center;gap:10px}
    .miniDot{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#060809;flex-shrink:0}

    .packBanner{border:1px solid var(--border2);border-left:4px solid var(--green);border-radius:14px;padding:20px 24px;background:var(--bg1)}
    .tag{font-family:var(--mono);font-size:9px;color:var(--green);background:rgba(0,255,136,.1);padding:3px 8px;border-radius:4px;letter-spacing:.1em}
    .scoreBig{font-family:var(--display);font-weight:900;font-size:52px;line-height:1}
    .meterRow{display:flex;align-items:center;gap:6px}
    .meterLab{font-family:var(--mono);font-size:7px;color:var(--dim);width:80px;letter-spacing:.07em}
    .meterBar{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:99px}
    .meterFill{height:100%;border-radius:99px;transition:width 1s}

    .claimBox{border:1px solid var(--border);border-radius:10px;padding:14px 16px;background:var(--bg1)}
    .claimBox .h{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--green);margin-bottom:5px}
    .failBox{border:1px solid rgba(255,77,106,.15);border-radius:10px;padding:14px 16px;background:rgba(255,77,106,.04)}
    .failBox .h{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--red);margin-bottom:5px}
    .failBox .t{font-family:var(--mono);font-size:11px;color:#fca5a5;line-height:1.65}

    .riskLegend{border:1px solid var(--border);background:rgba(255,255,255,.02);border-radius:12px;padding:12px;margin:12px 0 14px}
    .riskLegend .t{font-weight:900;font-size:13px;margin-bottom:6px;font-family:var(--display)}
    .riskLegend .p{color:var(--mid);font-size:12px;line-height:1.55;margin-bottom:10px}
    .riskLegend .row{display:flex;gap:8px;flex-wrap:wrap}
    .riskLegend .chip2{font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--mid)}
    .riskGuide{margin-top:10px;border-left:2px solid var(--blue);background:rgba(56,217,240,.06);border-radius:0 10px 10px 0;padding:10px 12px}
    .riskGuide .h{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
    .riskGuide .c{font-size:12px;line-height:1.55;color:var(--text)}

    .stakeBtns{display:flex;gap:6px}
    .stakeBtn{flex:1;padding:8px 0;border-radius:7px;border:none;cursor:pointer;font-family:var(--display);font-weight:900;font-size:14px;transition:all .15s}

    .monoSmall{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.08em}
    .legal{font-family:var(--mono);font-size:9px;color:var(--dim);text-align:center}
    .copyRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

    .out{
      margin-top:10px;background:#050707;border:1px solid rgba(0,255,136,.12);border-radius:12px;padding:12px;
      font-family:var(--mono);font-size:10px;color:#a8c0a8;white-space:pre-wrap;overflow-wrap:anywhere;max-height:260px;overflow:auto;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="nav">
    <div class="brand">
      <div class="dot"></div>
      <span>OPENLINE EXCHANGE</span>
    </div>
    <div class="crumb" id="crumb">LIVE MARKET</div>
  </div>

  <div class="ticker" aria-hidden="true">
    <div class="tickerTrack" id="tickerTrack"></div>
  </div>

  <div class="container">
    <div id="progressHost"></div>
    <div id="app"></div>
  </div>
</div>

<script>
(() => {
  const MARKET_STATS = {
    activePacks: 84,
    avgReturn: "2.3×",
    totalStaked: "$48,200",
    lastPayout: "$340",
    passRate: "67%",
    avgDays: 11,
  };

  const LIVE_FEED = [
    { id: "OP-ARB-7F2A", domain: "Machine Learning", p: 0.84, payout: "$340", status: "SETTLED PASS" },
    { id: "OP-ARB-3C9B", domain: "Synthetic Biology", p: 0.71, payout: "$180", status: "STAKED" },
    { id: "OP-BIO-1A4D", domain: "Neuroscience", p: 0.62, payout: "$520", status: "OPEN" },
    { id: "OP-ARB-8E2F", domain: "Robotics", p: 0.78, payout: "$210", status: "SETTLED PASS" },
    { id: "OP-CHM-5D1A", domain: "Materials Science", p: 0.55, payout: "$890", status: "STAKED" },
  ];

  const INTEREST_DOMAINS = [
    { key: "ai", icon: "🧠", label: "AI & Agents", sub: "LLMs, evals, alignment" },
    { key: "bio", icon: "🧬", label: "Biology", sub: "Synbio, genomics, cells" },
    { key: "climate", icon: "🌍", label: "Climate", sub: "Carbon, energy, materials" },
    { key: "neuro", icon: "⚡", label: "Neuroscience", sub: "Cognition, brain, behavior" },
    { key: "robotics", icon: "🤖", label: "Robotics", sub: "Autonomy, motion, sensing" },
    { key: "pharma", icon: "💊", label: "Drug Discovery", sub: "Molecules, targets, trials" },
    { key: "data", icon: "📈", label: "Data & Stats", sub: "Methods, inference, models" },
    { key: "physics", icon: "🔭", label: "Physics", sub: "Quantum, materials, optics" },
  ];

  const ROLES = [
    { key: "researcher", icon: "🧪", label: "I run experiments", sub: "I want to stake & test" },
    { key: "investor", icon: "💸", label: "I back ideas", sub: "I want to bet on outcomes" },
    { key: "builder", icon: "🛠", label: "I build things", sub: "I want problems to solve" },
    { key: "curious", icon: "🧭", label: "Just exploring", sub: "Show me what's here" },
  ];

  const BUDGETS = [
    { key: "low",  label: "$10–$50",  sub: "Test the waters" },
    { key: "mid",  label: "$50–$250", sub: "Serious bet" },
    { key: "high", label: "$250–$1k", sub: "Full position" },
    { key: "xl",   label: "$1k+",     sub: "Lead the round" },
  ];

  const STEPS = ["Market", "Your Profile", "Finding Your Pack", "Your Opportunity", "Get In"];

  const state = {
    step: 0, // 0..4
    profile: { domains: [], role: null, budget: null },
    pack: null,
    mode: null, // "bet" | "run"
  };

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");

  function setCrumb(){
    const label = state.step > 0 && STEPS[state.step] ? STEPS[state.step].toUpperCase() : "LIVE MARKET";
    $("crumb").textContent = label;
  }

  function renderProgress(){
    const host = $("progressHost");
    if (state.step <= 0 || state.step >= 4) { host.innerHTML = ""; return; }
    const stepIndex = state.step - 1;
    const total = 3;
    let bars = "";
    for (let i=0;i<total;i++){
      const flex = (i === stepIndex) ? 3 : 1;
      const bg = (i <= stepIndex) ? "var(--green)" : "var(--bg3)";
      const opacity = (i < stepIndex) ? 0.4 : 1;
      bars += `<div class="bar" style="flex:${flex};background:${bg};opacity:${opacity}"></div>`;
    }
    host.innerHTML = `<div class="progress">${bars}</div>`;
  }

  function statusDotColor(status){
    if (status.includes("PASS")) return "var(--green)";
    if (status === "STAKED") return "var(--amber)";
    return "var(--blue)";
  }

  function renderTicker(){
    const track = $("tickerTrack");
    const items = [...LIVE_FEED, ...LIVE_FEED];
    track.innerHTML = items.map(item => `
      <span class="tick">
        <span style="width:6px;height:6px;border-radius:50%;background:${statusDotColor(item.status)};display:inline-block"></span>
        <span>${esc(item.id)}</span>
        <strong>${esc(item.domain)}</strong>
        <strong style="color:${item.status.includes("PASS") ? "var(--green)" : "var(--text)"}">${esc(item.payout)}</strong>
        <span class="pill" style="
          background:${item.status.includes("PASS") ? "rgba(0,255,136,.12)" : item.status==="STAKED" ? "rgba(245,166,35,.1)" : "rgba(56,217,240,.1)"};
          color:${item.status.includes("PASS") ? "var(--green)" : item.status==="STAKED" ? "var(--amber)" : "var(--blue)"};
          border-color:rgba(255,255,255,.05)
        ">${esc(item.status)}</span>
      </span>
    `).join("");
  }

  function go(n){
    state.step = n;
    setCrumb();
    renderProgress();
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function makePack(profile){
    const domainNames = profile.domains.map(k => INTEREST_DOMAINS.find(d => d.key === k)?.label).filter(Boolean);
    const sourceDomain = domainNames[0] || "Neuroscience";
    const targetDomain = domainNames[1] || domainNames[0] || "Machine Learning";

    const roleLabel = ROLES.find(r => r.key === profile.role)?.label || "I run experiments";
    const budgetLabel = BUDGETS.find(b => b.key === profile.budget)?.label || "$50–$250";

    const dCount = Math.max(1, profile.domains.length);
    const roleBoost = profile.role === "researcher" ? 0.06 : profile.role === "builder" ? 0.04 : profile.role === "investor" ? 0.02 : 0.01;
    const budgetBoost = profile.budget === "xl" ? 0.06 : profile.budget === "high" ? 0.04 : profile.budget === "mid" ? 0.02 : 0.01;
    const base = 0.58 + Math.min(0.12, (dCount-1)*0.04) + roleBoost + budgetBoost;
    const pSuccess = Math.max(0.45, Math.min(0.86, base));

    const cheatRisk = pSuccess >= 0.78 ? "low" : pSuccess >= 0.62 ? "medium" : "high";
    const multiplier = cheatRisk === "low" ? 1.8 : cheatRisk === "medium" ? 2.1 : 2.7;
    const days = cheatRisk === "low" ? 7 : cheatRisk === "medium" ? 9 : 12;

    const id = `OP-ARB-${Math.random().toString(16).slice(2,6).toUpperCase()}`;

    const claim = `Translate a mechanism from ${sourceDomain} into ${targetDomain} and beat a baseline by ≥25% on a pre-registered metric within ${days} days.`;
    const falsifier = `FAIL if: improvement < 25% OR cost exceeds 3× baseline OR the mechanism cannot be reproduced by an independent rerun.`;
    const kpi = `≥25% improvement vs baseline`;

    const whyYou = `You picked ${domainNames.join(", ") || "a domain"}. That’s enough context to spot shortcut pathways and write a real falsifier. Budget: ${budgetLabel}. Role: ${roleLabel}.`;

    const witnesses = [
      ["W1_TRANSLATION","origin","hard","mechanism definition is explicit + testable","mechanism is metaphor / cannot be operationalized"],
      ["W2_BASELINE","cheat_suppression","hard","baseline is locked + measured before changes","baseline shifts / moving target"],
      ["W3_MECHANISM","mechanism_fidelity","hard","effect persists under control + ablation","effect vanishes under control/ablation"],
      ["W4_COST","cost_feasibility","soft","time+cost remain within cap","time+cost blow past cap"],
    ];

    const exec = Math.max(0.5, Math.min(0.92, 0.62 + (profile.role==="researcher"?0.12:0.06) + (profile.budget==="high"||profile.budget==="xl"?0.06:0.02)));
    const mech = Math.max(0.45, Math.min(0.9, 0.6 + (dCount>=2?0.12:0.06)));
    const costFit = Math.max(0.4, Math.min(0.9, 0.58 + (profile.budget==="xl"?0.2:profile.budget==="high"?0.12:profile.budget==="mid"?0.06:0.02)));

    const minStake = profile.budget==="low"?25 : profile.budget==="mid"?50 : profile.budget==="high"?250 : 500;

    return {
      id, title: "Cross-domain mechanism translation",
      domain: targetDomain, source_domain: sourceDomain,
      claim, falsifier, kpi, cheat_risk: cheatRisk,
      why_you: whyYou, witnesses,
      executability: exec, mechanism_clarity: mech, cost_feasibility: costFit,
      p_success: pSuccess,
      min_stake: minStake,
      expected_return_multiplier: multiplier,
      time_to_result_days: days,
    };
  }

  function riskGuideText(pack){
    if (!pack) return "Pick a pack to see the recommended proof discipline.";
    if (pack.cheat_risk === "high") return "HIGH: assume it can fake a win. Strict controls first + outside verification.";
    if (pack.cheat_risk === "medium") return "MED: controls + a replicate. Watch decay/side-effects. If replicate fails, stop.";
    return "LOW: still test it, but basic controls usually catch failure. Run the cheap falsifier first.";
  }

  function packToIssue(pack, profile){
    const domainNames = profile.domains.map(k => INTEREST_DOMAINS.find(d => d.key === k)?.label).filter(Boolean).join(", ") || "—";
    const witnessLines = (pack.witnesses||[]).map(w =>
      `- ${w[0]} (${w[1]}, ${w[2]}): PASS if ${w[3]}. FAIL if ${w[4]}.`
    ).join("\n");

    return `ID: ${pack.id}
FLOW: exchange_onboarding_demo
PROFILE:
- domains: ${domainNames}
- role: ${profile.role}
- budget: ${profile.budget}

PACK:
- title: ${pack.title}
- source_domain: ${pack.source_domain}
- domain: ${pack.domain}
- p_success: ${Math.round(pack.p_success*100)}%
- cheat_risk: ${pack.cheat_risk}

CLAIM:
- ${pack.claim}

FALSIFIER (kill conditions):
- ${pack.falsifier}

COURT TESTS:
${witnessLines}

RECEIPT_FAMILY:
- openline.science.v1
`;
  }

  function packToReceiptStub(pack){
    return JSON.stringify({
      receipt_family: "openline.science.v1",
      kind: "opportunity_pack",
      id: pack.id,
      domain: pack.domain,
      source_domain: pack.source_domain,
      claim: pack.claim,
      falsifier: pack.falsifier,
      witnesses: pack.witnesses,
      p_success: pack.p_success,
      cheat_risk: pack.cheat_risk,
      expected_return_multiplier: pack.expected_return_multiplier,
      time_to_result_days: pack.time_to_result_days,
      sha256: "DEMO_ONLY__NO_SIGNATURE",
      timestamp: new Date().toISOString()
    }, null, 2);
  }

  function viewMarket(){
    const app = $("app");
    app.innerHTML = `
      <div class="fu" style="max-width:760px;margin:0 auto;padding:40px 0 0">
        <div class="fu" style="text-align:center;margin-bottom:48px">
          <div style="font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px">
            OpenLine Exchange · Live Market
          </div>
          <div style="font-family:var(--display);font-weight:900;font-size:clamp(52px,10vw,96px);line-height:1;color:var(--green);letter-spacing:-.02em;text-shadow:0 0 40px rgba(0,255,136,.4)">
            ${esc(MARKET_STATS.totalStaked)}
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--mid);margin-top:8px">
            currently staked across ${esc(MARKET_STATS.activePacks)} open packs
          </div>
        </div>

        <div class="fu1 grid3" style="margin-bottom:32px">
          ${[
            { label:"AVG RETURN", value: MARKET_STATS.avgReturn, color:"var(--green)", sub:"per winning position" },
            { label:"LAST PAYOUT", value: MARKET_STATS.lastPayout, color:"var(--amber)", sub:"ML eval pack · recently" },
            { label:"PASS RATE", value: MARKET_STATS.passRate, color:"var(--blue)", sub:"of settled experiments" },
          ].map(s => `
            <div class="card" style="padding:18px 20px;text-align:center">
              <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.12em;margin-bottom:8px">${esc(s.label)}</div>
              <div style="font-family:var(--display);font-size:36px;font-weight:900;color:${s.color};line-height:1;margin-bottom:4px">${esc(s.value)}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--mid)">${esc(s.sub)}</div>
            </div>
          `).join("")}
        </div>

        <div class="fu3" style="text-align:center">
          <div class="muted" style="margin-bottom:16px">We’ll match you to a pack for your background and tolerance.</div>
